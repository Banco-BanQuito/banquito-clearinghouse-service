# ==========================================
# APP
# ==========================================

spring.application.name=banquito-clearinghouse-adapter

server.port=${SERVER_PORT:8087}

# ==========================================
# MONGODB
# ==========================================

# Use variables de entorno (por ejemplo desde un .env) o valores por defecto.
spring.mongodb.host=${MONGODB_HOST:localhost}
spring.mongodb.port=${MONGODB_PORT:27017}
spring.mongodb.database=${MONGODB_DATABASE:clearingdb}

# Alternativa URI
# spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/clearingdb}

# ==========================================
# RABBITMQ
# ==========================================

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

rabbitmq.clearing.queue=${RABBITMQ_CLEARING_QUEUE:clearing.outbound.queue}

# ==========================================
# ACCOUNTING SERVICE (BRYAN)
# ==========================================
# URL del servicio de contabilidad, configurable por entorno
accounting.service.url=${ACCOUNTING_SERVICE_URL:http://localhost:8010/api/v2/accounting/entries}

# ==========================================
# COMPENSATION FILE
# ==========================================
# Directorio de salida opcional (vacío = usar temp dir en user.home)
compensation.output.dir=${COMPENSATION_OUTPUT_DIR:}

# ==========================================
# ACTUATOR
# ==========================================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==========================================
# LOGGING
# ==========================================

logging.level.root=INFO
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.data.mongodb=INFO

# ==========================================
# JACKSON
# ==========================================

# Nota: para usar un archivo .env en runtime puedes ańadir una ApplicationListener
# que cargue variables desde .env y las inyecte en Spring Environment (opcional).
# Ejemplo de variables esperadas (.env):
# MONGODB_HOST=localhost
# MONGODB_PORT=27017
# MONGODB_DATABASE=clearingdb
# RABBITMQ_HOST=localhost
# RABBITMQ_PORT=5672
# RABBITMQ_USERNAME=guest
# RABBITMQ_PASSWORD=guest
# ACCOUNTING_SERVICE_URL=http://localhost:8010/api/v2/accounting/entries
