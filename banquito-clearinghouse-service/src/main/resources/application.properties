spring.application.name=banquito-clearinghouse-service
server.port=${SERVER_PORT:8087}

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:}}
spring.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:}}

spring.mongodb.host=${MONGODB_HOST:localhost}
spring.mongodb.port=${MONGODB_PORT:27017}
spring.mongodb.database=${MONGODB_DATABASE:clearingdb}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:${RABBITMQ_HOST:localhost}}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:${RABBITMQ_PORT:5672}}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:${RABBITMQ_USERNAME:guest}}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:${RABBITMQ_PASSWORD:guest}}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}

rabbitmq.clearing.queue=${RABBITMQ_CLEARING_QUEUE:clearing.outbound.queue}

accounting.service.url=${ACCOUNTING_SERVICE_URL:http://localhost:8010/api/v2/accounting/entries}

compensation.output.dir=${COMPENSATION_OUTPUT_DIR:}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

logging.level.root=INFO
logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.data.mongodb=INFO
